name: Deploy Study Notes to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Build all books
        run: |
          mkdir -p _site
          shopt -s nullglob
          books=(books/*/mkdocs.yml)

          if [ ${#books[@]} -eq 0 ]; then
            echo '<html><body><h1>Study Notes</h1><p>No books registered yet.</p></body></html>' > _site/index.html
          else
            for config in "${books[@]}"; do
              slug=$(basename "$(dirname "$config")")
              echo "Building: $slug"
              mkdocs build --config-file "$config" --site-dir "$(pwd)/_site/$slug"
            done

            echo '<html><body><h1>Study Notes</h1><ul>' > _site/index.html
            for config in "${books[@]}"; do
              slug=$(basename "$(dirname "$config")")
              echo "<li><a href=\"${slug}/\">$slug</a></li>" >> _site/index.html
            done
            echo '</ul></body></html>' >> _site/index.html
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
